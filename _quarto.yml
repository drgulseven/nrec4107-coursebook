project:
  type: website
  output-dir: _site
  resources:
    - assets/reader-tools.js
  render:
    - "*.qmd"
    - "part-i/*.qmd"
    - "part-ii/*.qmd"
    - "part-iii/*.qmd"
    - "part-iv/*.qmd"
    - "part-v/*.qmd"
    - "part-vi/*.qmd"
    - "appendices/*.qmd"
    - "!notes/"
    - "!staging/"
    - "!incoming-zips/"

execute:
  freeze: auto

jupyter: .venv/bin/python

