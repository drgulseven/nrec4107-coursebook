<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420"><rect width="900" height="420" fill="white"/><text x="450" y="45" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700">Feature Importance and Prediction Limits</text><rect x="80" y="95" width="260" height="230" rx="18" fill="#ecfeff" stroke="#0e7490"/><text x="210" y="135" text-anchor="middle" font-family="Arial" font-size="23" font-weight="700">Prediction</text><rect x="125" y="175" width="170" height="24" fill="#a5f3fc"/><rect x="125" y="215" width="120" height="24" fill="#a5f3fc"/><rect x="125" y="255" width="80" height="24" fill="#a5f3fc"/><text x="210" y="355" text-anchor="middle" font-family="Arial" font-size="18">Which variables help forecast?</text><text x="450" y="215" text-anchor="middle" font-family="Arial" font-size="42" font-weight="700">≠</text><rect x="560" y="95" width="260" height="230" rx="18" fill="#fff7ed" stroke="#c2410c"/><text x="690" y="135" text-anchor="middle" font-family="Arial" font-size="23" font-weight="700">Causation</text><circle cx="650" cy="215" r="36" fill="#fed7aa" stroke="#c2410c"/><circle cx="735" cy="215" r="36" fill="#fed7aa" stroke="#c2410c"/><path d="M685 215 L700 215" stroke="#7c2d12" stroke-width="4" marker-end="url(#a)"/><text x="650" y="222" text-anchor="middle" font-family="Arial" font-size="16">X</text><text x="735" y="222" text-anchor="middle" font-family="Arial" font-size="16">Y</text><text x="690" y="355" text-anchor="middle" font-family="Arial" font-size="18">What causes the outcome?</text><text x="450" y="385" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Important predictors are not necessarily causes</text><defs><marker id="a" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#7c2d12"/></marker></defs></svg>